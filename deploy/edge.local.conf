# Local TLS edge of the ACMEsuite: terminates HTTPS (mkcert certificates) and proxies everything to
# the app. Project rule: everything over TLS. In prod the real edge handles this (Let's Encrypt).
# The suite has (as yet) no web frontend of its own — so everything is simply passed through.

server {
  listen 443 ssl;
  server_name localhost;

  ssl_certificate     /certs/cert.pem;
  ssl_certificate_key /certs/key.pem;

  location / {
    proxy_pass http://acmesuite-backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Redirect plain HTTP to HTTPS (port 8543 on the host).
server {
  listen 80;
  server_name _;
  return 301 https://$host:8543$request_uri;
}
