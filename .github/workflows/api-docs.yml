# Builds a static API portal from the OpenAPI contracts (api/*.yaml) and publishes it to
# GitHub Pages on the custom domain api.acmesoftware.de (HTTPS enforced, see api/portal/CNAME
# and the repo setting Pages → "Enforce HTTPS"). One Redoc page per module spec + bundled spec downloads.
name: API-Portal

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'redocly.yaml'
      - '.github/workflows/api-docs.yml'
  pull_request:
    paths:
      - 'api/**'
      - 'redocly.yaml'
      - '.github/workflows/api-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; do not cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  REDOCLY: '@redocly/cli@1'
  MODULES: 'hr crm supply build'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint the contracts
        run: npx --yes $REDOCLY lint

      - name: Build the portal (Redoc page + bundled spec per module)
        run: |
          set -euo pipefail
          mkdir -p _site/specs
          for m in $MODULES; do
            echo "::group::build $m"
            npx --yes $REDOCLY build-docs "api/acme-$m.yaml" -o "_site/$m.html"
            npx --yes $REDOCLY bundle     "api/acme-$m.yaml" -o "_site/specs/acme-$m.yaml"
            echo "::endgroup::"
          done
          # ship the shared building blocks as a self-contained reference too
          npx --yes $REDOCLY bundle api/acme-base.yaml -o _site/specs/acme-base.yaml
          cp api/portal/index.html _site/index.html
          cp api/portal/CNAME      _site/CNAME
          # 404 → landing page, so deep links don't dead-end
          cp api/portal/index.html _site/404.html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    # Only main publishes; PRs build (lint gate) without deploying.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
