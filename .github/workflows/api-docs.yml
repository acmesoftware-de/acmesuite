# Builds the static API developer portal from the OpenAPI contracts (api/*.yaml): lints, bundles,
# merges into a combined all.yaml, renders Redoc, generates the oasdiff changelog and validates the
# GraphQL Mesh image. This is a build/lint gate — the portal is deployed to api.acmesoftware.de by
# uploading api/portal/ to the Hetzner VM directly (DNS points there, not at GitHub Pages).
name: API-Portal

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'api/**'
      - 'mesh/**'
      - 'redocly.yaml'
      - '.github/workflows/api-docs.yml'
  pull_request:
    paths:
      - 'api/**'
      - 'mesh/**'
      - 'redocly.yaml'
      - '.github/workflows/api-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-portal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, needed by api/changelog.sh (oasdiff git-ref diffs)

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install oasdiff
        run: |
          set -euo pipefail
          VERSION=$(curl -s https://api.github.com/repos/oasdiff/oasdiff/releases/latest | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
          curl -sSfL -o oasdiff.deb "https://github.com/oasdiff/oasdiff/releases/download/v${VERSION}/oasdiff_${VERSION}_linux_amd64.deb"
          sudo dpkg -i oasdiff.deb
          oasdiff --version

      - name: Build the portal (lint, bundle, merge, Redoc)
        run: bash api/build-portal.sh

      - name: Build the API changelog (oasdiff across tagged versions)
        run: bash api/changelog.sh

      - name: Validate the GraphQL Mesh image builds
        run: docker build -t acmesuite-mesh-ci ./mesh

      - name: Upload portal artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-portal
          path: api/portal
          retention-days: 14
