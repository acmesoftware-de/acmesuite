# Builds the static API developer portal from the OpenAPI contracts (api/*.yaml): lints, bundles,
# merges into a combined all.yaml, renders Redoc, generates the oasdiff changelog and validates the
# GraphQL Mesh image. On push to main (and manual dispatch) the built portal is then auto-deployed
# via rsync to api.acmesoftware.de (nginx docroot on the Hetzner VM; DNS points there, not GitHub
# Pages) as a restricted, dedicated deploy user -- see the `deploy` job + PORTAL_DEPLOY_* secrets.
name: API-Portal

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'api/**'
      - 'mesh/**'
      - 'redocly.yaml'
      - '.github/workflows/api-docs.yml'
  pull_request:
    paths:
      - 'api/**'
      - 'mesh/**'
      - 'redocly.yaml'
      - '.github/workflows/api-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-portal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, needed by api/changelog.sh (oasdiff git-ref diffs)

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install oasdiff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Authenticated download via gh (the unauthenticated api.github.com lookup was getting
          # rate-limited on shared runners -> empty version -> pipefail). `gh release download`
          # with no tag = latest, uses GH_TOKEN, and is robust to release-asset name changes.
          gh release download --repo oasdiff/oasdiff \
            --pattern 'oasdiff_*_linux_amd64.deb' --output oasdiff.deb --clobber
          sudo dpkg -i oasdiff.deb
          oasdiff --version

      - name: Build the portal (lint, bundle, merge, Redoc)
        run: bash api/build-portal.sh

      - name: Build the API changelog (oasdiff across tagged versions)
        run: bash api/changelog.sh

      - name: Validate the GraphQL Mesh image builds
        run: docker build -t acmesuite-mesh-ci ./mesh

      - name: Upload portal artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-portal
          path: api/portal
          retention-days: 14

  # Auto-deploy the built portal to api.acmesoftware.de (nginx docroot /var/www/api-portal on the
  # Hetzner VM). Only on push to main (and manual dispatch) -- never on PRs/forks. rsync runs as a
  # dedicated, restricted deploy user (see PORTAL_DEPLOY_* secrets) that owns only the docroot.
  deploy:
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download portal artifact
        uses: actions/download-artifact@v4
        with:
          name: api-portal
          path: portal

      - name: Deploy to api.acmesoftware.de (rsync)
        env:
          DEPLOY_KEY: ${{ secrets.PORTAL_DEPLOY_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.PORTAL_DEPLOY_KNOWN_HOSTS }}
          DEPLOY_HOST: ${{ secrets.PORTAL_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PORTAL_DEPLOY_USER }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_KEY" > "$HOME/.ssh/portal_deploy"
          chmod 600 "$HOME/.ssh/portal_deploy"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/portal_known_hosts"
          rsync -rlptz --delete --chmod=D755,F644 \
            -e "ssh -i $HOME/.ssh/portal_deploy -o UserKnownHostsFile=$HOME/.ssh/portal_known_hosts -o IdentitiesOnly=yes" \
            portal/ "$DEPLOY_USER@$DEPLOY_HOST:/var/www/api-portal/"
          echo "Deployed $(find portal -type f | wc -l) files to api.acmesoftware.de."
