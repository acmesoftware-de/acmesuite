<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACMEsuite — GraphQL UI</title>
  <link rel="icon" href="/assets/logo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/vendor/graphiql.min.css">
  <link rel="stylesheet" href="/assets/fonts/acme-fonts.css">
  <link rel="stylesheet" href="/assets/brand.css">
  <style>
    html, body { height:100%; }
    .debug{background:var(--hr); border-bottom:2px solid var(--ink); color:var(--ink);
           padding:10px 24px; font-family:var(--mono); font-size:13px;}
    .debug code{background:#fff;}
    #graphiql{height: calc(100% - 60px - 41px);}
  </style>
</head>
<body>
  <nav class="portal-nav">
    <a class="brand" href="/"><span class="bars"><i></i><i></i><i></i><i></i></span>
      <span class="wm"><b>ACME</b><span>SOFTWARE</span></span></a>
    <span class="nav-links">
      <a href="/">Portal</a>
      <a href="/swagger/">Swagger</a>
      <a href="/redoc/">Redoc</a>
      <a href="/graphql-ui/" class="active">GraphQL</a>
      <a href="/changelog/">Changelog</a>
      <a href="/openapi/all.yaml">OpenAPI</a>
    </span>
    <span class="nav-badge">API PORTAL</span>
  </nav>
  <div class="debug">
    GraphQL endpoint: <code>/graphql</code> &middot; Experimental — generated from the OpenAPI contracts via GraphQL Mesh,
    proxies to <code>demo.acmesoftware.de</code>.
  </div>
  <div id="graphiql">Loading GraphiQL…</div>
  <script src="/assets/vendor/react.production.min.js"></script>
  <script src="/assets/vendor/react-dom.production.min.js"></script>
  <script src="/assets/vendor/graphiql.min.js"></script>
  <script>
    const fetcher = GraphiQL.createFetcher({ url: '/graphql' });
    ReactDOM.render(
      React.createElement(GraphiQL, { fetcher: fetcher }),
      document.getElementById('graphiql')
    );
  </script>
</body>
</html>
