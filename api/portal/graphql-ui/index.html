<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ACMEsuite — GraphQL UI</title>
  <link rel="stylesheet" href="https://unpkg.com/graphiql@2.4.7/graphiql.min.css">
  <style>
    :root { --bg:#0f1115; --edge:#262b36; --fg:#e8eaed; --muted:#9aa4b2; --accent:#5b9dff; }
    html, body { height:100%; margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    nav.portal-nav { display:flex; gap:18px; align-items:center; padding:12px 20px;
                     background:#0b0d11; border-bottom:1px solid var(--edge); font-size:.9rem;
                     color:var(--fg); }
    nav.portal-nav a { color:var(--muted); text-decoration:none; font-weight:600; }
    nav.portal-nav a:hover, nav.portal-nav a.active { color:var(--fg); }
    .debug { background:#f8fafc; border-bottom:1px solid #e2e8f0; color:#334155; padding:8px 20px; font-size:13px; }
    .debug code { background:#e2e8f0; border-radius:6px; padding:2px 6px; }
    #graphiql { height: calc(100% - 84px); }
  </style>
</head>
<body>
  <nav class="portal-nav">
    <a href="/">Portal Home</a>
    <a href="/swagger/">Swagger</a>
    <a href="/redoc/">Redoc</a>
    <a href="/graphql-ui/" class="active">GraphQL UI</a>
    <a href="/changelog/">Changelog</a>
    <a href="/openapi/all.yaml">OpenAPI</a>
  </nav>
  <div class="debug">
    GraphQL endpoint: <code>/graphql</code> · Experimental — generated from the OpenAPI contracts via GraphQL Mesh,
    proxies to <code>demo.acmesoftware.de</code>.
  </div>
  <div id="graphiql">Loading GraphiQL…</div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/graphiql@2.4.7/graphiql.min.js"></script>
  <script>
    const fetcher = GraphiQL.createFetcher({ url: '/graphql' });
    ReactDOM.render(
      React.createElement(GraphiQL, { fetcher: fetcher }),
      document.getElementById('graphiql')
    );
  </script>
</body>
</html>
