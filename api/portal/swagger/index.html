<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ACMEsuite — Swagger Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    :root { --bg:#0f1115; --edge:#262b36; --fg:#e8eaed; --muted:#9aa4b2; --accent:#5b9dff; }
    html, body { margin:0; height:100%; background:#fff; }
    nav.portal-nav { display:flex; gap:18px; align-items:center; padding:12px 20px;
                     background:#0b0d11; border-bottom:1px solid var(--edge); font:14px -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    nav.portal-nav a { color:var(--muted); text-decoration:none; font-weight:600; }
    nav.portal-nav a:hover, nav.portal-nav a.active { color:var(--fg); }
    #swagger-ui { max-width: 1400px; margin: 0 auto; }
  </style>
</head>
<body>
  <nav class="portal-nav">
    <a href="/">Portal Home</a>
    <a href="/swagger/" class="active">Swagger</a>
    <a href="/redoc/">Redoc</a>
    <a href="/graphql-ui/">GraphQL UI</a>
    <a href="/changelog/">Changelog</a>
    <a href="/openapi/all.yaml">OpenAPI</a>
  </nav>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    fetch('./swagger-config.json')
      .then(function (r) { return r.json(); })
      .then(function (config) {
        window.ui = SwaggerUIBundle(Object.assign({
          dom_id: '#swagger-ui',
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: 'StandaloneLayout'
        }, config));
      });
  </script>
</body>
</html>
