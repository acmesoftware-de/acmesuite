spring:
  application:
    name: acmesuite
  datasource:
    # docker compose up -d acmesuite-db  →  Postgres on :5545 (does not collide with :5544)
    url: jdbc:postgresql://localhost:5545/acme_suite
    username: acme
    password: acme
  jpa:
    hibernate:
      # Flyway owns the schema (schema ownership). Hibernate only validates.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  modulith:
    events:
      # The event publication registry (transactional outbox) table is owned by Flyway
      # (V23), not auto-created by Modulith.
      jdbc:
        schema-initialization:
          enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith
  info:
    # /actuator/info surfaces the running version + git commit (build-info.properties +
    # git.properties, generated at build time).
    build:
      enabled: true
    git:
      mode: full
    java:
      enabled: true
    os:
      enabled: true

# ACMEbase auth (WATCH/WORK/ADMIN on the suite APIs). Default off = open (dev mode);
# set to true to enable authentication → Base-issued session JWT (bearer). Federated
# login (Entra/OIDC) authenticates the identity; roles are assigned locally in Base.
acme:
  # Central full-text search (Lucene). The index is a derived projection: fed live by module
  # domain events (outbox) and rebuildable from each module via /api/search/reindex.
  search:
    index-dir: ${ACME_SEARCH_INDEX_DIR:data/search-index}
  base:
    auth:
      enabled: false
      # HS256 signing secret for the Base session token. DEV VALUE — override in prod
      # (env ACME_BASE_AUTH_JWT_SECRET); must be >= 32 bytes.
      jwt:
        secret: ${ACME_BASE_AUTH_JWT_SECRET:dev-only-insecure-jwt-secret-change-me-please-32b}
        ttl: PT12H
      # Master key (base64, 32 bytes) for AES-GCM envelope encryption of provider
      # secrets at rest. DEV VALUE — override in prod (env ACME_BASE_CRYPTO_MASTER_KEY).
      crypto:
        master-key: ${ACME_BASE_CRYPTO_MASTER_KEY:YWNtZS1zdWl0ZS1kZXYtbWFzdGVyLWtleS0zMmJ5dGU=}
      # Local break-glass admin created at first startup if no ADMIN exists.
      #  - admin-password SET  -> that is the admin's password (nothing logged, no forced change).
      #  - admin-password UNSET -> a random one-time password is logged once and must be changed
      #    on first login (fine for local dev; useless where you cannot read the logs).
      bootstrap:
        admin-username: admin
        admin-password: ${ACME_BASE_AUTH_BOOTSTRAP_ADMIN_PASSWORD:}
      # Federated OIDC redirect flow. post-login-url is where Base sends the browser back
      # after login (token in the URL fragment); same-origin in prod, the frontend origin
      # in split dev setups (e.g. http://localhost:5273).
      oidc:
        post-login-url: ${ACME_BASE_AUTH_OIDC_POST_LOGIN_URL:/}
